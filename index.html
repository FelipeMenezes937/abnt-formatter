<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Formatador ABNT</title>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; }
    h1 { text-align: center; color: #333; }
    .upload-area { border: 2px dashed #ccc; padding: 30px; text-align: center; margin: 20px 0; }
    button { width: 100%; padding: 15px; background: #2e7d32; color: white; border: none; font-size: 16px; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .sucesso { color: green; text-align: center; }
    .erro { color: red; text-align: center; }
    .download-btn { display: block; width: 100%; padding: 15px; background: #1976d2; color: white; text-align: center; text-decoration: none; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Formatador ABNT</h1>
  <div class="upload-area">
    <input type="file" id="fileInput" accept=".docx,.txt">
    <p id="fileName"></p>
  </div>
  <button id="btn" onclick="formatar()" disabled>Formatar Documento</button>
  <p id="msg"></p>
  <a id="download" class="download-btn" style="display:none">Download</a>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    const download = document.getElementById('download');

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (ext === 'docx' || ext === 'txt') {
          fileName.textContent = file.name;
          btn.disabled = false;
          msg.textContent = '';
        }
      }
    });

    async function criarDocxAbnt(linhas) {
      const zip = new JSZip();
      
      const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;

      const rels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

      const documentRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
</Relationships>`;

      const styles = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:style w:type="paragraph" w:default="1" w:styleId="Normal">
    <w:name w:val="Normal"/>
    <w:qFormat/>
  </w:style>
</w:styles>`;

      const paragraphsXml = linhas.map(linha => {
        const escapedText = linha
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        return `<w:p>
          <w:pPr>
            <w:jc w:val="both"/>
            <w:ind w:firstLine="1250"/>
            <w:spacing w:line="360" w:lineRule="auto"/>
          </w:pPr>
          <w:r>
            <w:rPr>
              <w:rFonts w:ascii="Times New Roman" w:hAnsi="Times New Roman"/>
              <w:sz w:val="24"/>
            </w:rPr>
            <w:t>${escapedText}</w:t>
          </w:r>
        </w:p>`;
      }).join('');

      const document = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:body>
    <w:sectPr>
      <w:pgSz w:w="12240" w:h="15840"/>
      <w:pgMar w:top="1701" w:right="1134" w:bottom="1134" w:left="1701" w:header="708" w:footer="708" w:gutter="0"/>
    </w:sectPr>
    ${paragraphsXml}
  </w:body>
</w:document>`;

      zip.file('[Content_Types].xml', contentTypes);
      zip.file('_rels/.rels', rels);
      zip.file('word/_rels/document.xml.rels', documentRels);
      zip.file('word/document.xml', document);
      zip.file('word/styles.xml', styles);

      return await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    }

    async function formatar() {
      const file = fileInput.files[0];
      if (!file) return;

      btn.disabled = true;
      msg.textContent = 'Processando...';

      try {
        let texto = '';
        const ext = file.name.split('.').pop().toLowerCase();

        if (ext === 'docx') {
          const arrayBuffer = await file.arrayBuffer();
          const result = await mammoth.extractRawText({ arrayBuffer });
          texto = result.value;
        } else {
          texto = await file.text();
        }

        const linhas = texto.split('\n').filter(l => l.trim());

        if (linhas.length === 0) {
          linhas.push('');
        }

        const blob = await criarDocxAbnt(linhas);
        const url = URL.createObjectURL(blob);

        download.href = url;
        download.download = 'documento_abnt.docx';
        download.style.display = 'block';
        msg.textContent = 'Sucesso!';
      } catch (e) {
        msg.textContent = 'Erro: ' + e.message;
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
