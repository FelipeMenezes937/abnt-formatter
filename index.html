<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formatador ABNT</title>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
      padding: 48px 40px;
      position: relative;
    }
    .header { text-align: center; margin-bottom: 40px; }
    .header-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 4px 12px rgba(44, 62, 80, 0.25);
    }
    .header-icon svg { width: 28px; height: 28px; fill: white; }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px; font-weight: 600;
      color: #2c3e50; margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .subtitulo { font-size: 14px; color: #7f8c8d; line-height: 1.5; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, #e0e0e0, transparent); margin: 32px 0; }
    .upload-area {
      border: 2px dashed #dde1e6;
      border-radius: 12px;
      padding: 40px 24px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
      background: #fafbfc;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #2c3e50;
      background: #f5f6f8;
    }
    .upload-icon { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.5; }
    .upload-icon svg { width: 100%; height: 100%; fill: #7f8c8d; }
    .upload-text { font-size: 15px; color: #5a6c7d; margin-bottom: 8px; }
    .upload-text span { color: #2c3e50; font-weight: 500; }
    .upload-hint { font-size: 12px; color: #95a5a6; }
    .file-name {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 16px; padding: 8px 16px;
      background: #e8ecef; border-radius: 20px;
      font-size: 13px; color: #2c3e50;
    }
    .file-input { display: none; }
    .btn-formatar {
      width: 100%; padding: 16px 24px;
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      color: white; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 500; cursor: pointer;
      transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 24px;
    }
    .btn-formatar:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(44, 62, 80, 0.3);
    }
    .btn-formatar:disabled { background: #bdc3c7; cursor: not-allowed; }
    .btn-formatar svg { width: 18px; height: 18px; fill: currentColor; }
    .mensagem {
      text-align: center; margin-top: 20px;
      font-size: 14px; padding: 12px; border-radius: 8px;
    }
    .mensagem.sucesso { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .mensagem.erro { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .btn-download {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 16px 24px;
      background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
      color: white; text-decoration: none; border-radius: 10px;
      font-size: 15px; font-weight: 500; margin-top: 16px;
      transition: all 0.3s ease;
    }
    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(39, 174, 96, 0.35);
    }
    .btn-download svg { width: 18px; height: 18px; fill: currentColor; }
    .regras {
      margin-top: 36px; padding: 24px;
      background: #f8f9fa; border-radius: 12px; border: 1px solid #e9ecef;
    }
    .regras-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .regras-header svg { width: 18px; height: 18px; fill: #7f8c8d; }
    .regras h3 { font-size: 13px; font-weight: 600; color: #7f8c8d; text-transform: uppercase; letter-spacing: 0.5px; }
    .regras ul { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; list-style: none; }
    .regras li { font-size: 13px; color: #5a6c7d; display: flex; align-items: center; gap: 8px; }
    .regras li::before { content: ''; width: 6px; height: 6px; background: #2c3e50; border-radius: 50%; }
    .theme-toggle {
      position: absolute; top: 20px; right: 20px;
      background: none; border: 1px solid #e0e0e0; border-radius: 8px;
      width: 36px; height: 36px; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease; opacity: 0.7;
    }
    .theme-toggle:hover { opacity: 1; border-color: #2c3e50; background: #f5f6f8; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 480px) {
      .container { padding: 32px 24px; }
      h1 { font-size: 24px; }
      .regras ul { grid-template-columns: 1fr; }
    }
    /* Dark Mode */
    body.dark { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    body.dark .container { background: #1f2937; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3); }
    body.dark h1, body.dark .subtitulo, body.dark .upload-text, body.dark .file-name, body.dark .regras li { color: #f1f3f5; }
    body.dark .divider { background: linear-gradient(90deg, transparent, #374151, transparent); }
    body.dark .upload-area { border-color: #374151; background: #1a1f29; }
    body.dark .upload-area:hover { border-color: #6b7280; background: #1f2937; }
    body.dark .upload-icon svg, body.dark .upload-hint { fill: #9ca3af; }
    body.dark .upload-text span, body.dark .regras li::before { color: #f1f3f5; }
    body.dark .regras { background: #1a1f29; border-color: #374151; }
    body.dark .regras-header svg { fill: #9ca3af; }
    body.dark .regras h3 { color: #9ca3af; }
    body.dark .btn-formatar { background: linear-gradient(135deg, #4a5568 0%, #5a6578 100%); }
    body.dark .btn-formatar:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(74, 85, 104, 0.4); }
    body.dark .btn-download { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
    body.dark .btn-download:hover { box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35); }
    body.dark .theme-toggle { border-color: #374151; color: #ffd700; }
    body.dark .theme-toggle:hover { background: #374151; }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleDark()" id="themeBtn">🌙</button>
  
  <div class="container">
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
      </div>
      <h1>Formatador ABNT</h1>
      <p class="subtitulo">Formate seus documentos para o padrão ABNT em segundos</p>
    </div>

    <div class="divider"></div>

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <input type="file" class="file-input" id="fileInput" accept=".docx,.txt">
      <div class="upload-icon">
        <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
      </div>
      <p class="upload-text"><span>Clique para selecionar</span> ou arraste o arquivo</p>
      <p class="upload-hint">Suporta arquivos .docx e .txt</p>
      <span class="file-name" id="fileName" style="display:none"></span>
    </div>

    <button class="btn-formatar" id="btn" onclick="formatar()" disabled>
      <span id="btnIcon"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg></span>
      <span id="btnText">Formatar Documento</span>
    </button>

    <p class="mensagem" id="msg" style="display:none"></p>

    <a class="btn-download" id="download" style="display:none" download="documento_abnt.docx">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      <span>Download</span>
    </a>

    <div class="regras">
      <div class="regras-header">
        <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        <h3>Normas aplicadas</h3>
      </div>
      <ul>
        <li>Times New Roman 12</li>
        <li>Espaçamento 1,5</li>
        <li>Margens 3/2 cm</li>
        <li>Justificado</li>
      </ul>
    </div>
  </div>

  <script>
    const savedDark = localStorage.getItem('darkMode');
    if (savedDark === 'true') {
      document.body.classList.add('dark');
      document.getElementById('themeBtn').textContent = '☀️';
    }

    function toggleDark() {
      const isDark = document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', isDark);
      document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
    }

    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const uploadArea = document.getElementById('uploadArea');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    const download = document.getElementById('download');
    const btnIcon = document.getElementById('btnIcon');
    const btnText = document.getElementById('btnText');

    let arquivo = null;

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        arquivo = file;
        fileName.textContent = file.name;
        fileName.style.display = 'inline-flex';
        btn.disabled = false;
        msg.style.display = 'none';
      }
    });

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) {
        arquivo = file;
        fileName.textContent = file.name;
        fileName.style.display = 'inline-flex';
        btn.disabled = false;
        msg.style.display = 'none';
      }
    });

    async function criarDocxAbnt(linhas) {
      const zip = new JSZip();
      
      const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;

      const rels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

      const documentRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
</Relationships>`;

      const styles = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:style w:type="paragraph" w:default="1" w:styleId="Normal">
    <w:name w:val="Normal"/>
    <w:qFormat/>
  </w:style>
</w:styles>`;

      const paragraphsXml = linhas.map(linha => {
        const escapedText = linha.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return `<w:p>
          <w:pPr>
            <w:jc w:val="both"/>
            <w:ind w:firstLine="1250"/>
            <w:spacing w:line="360" w:lineRule="auto"/>
          </w:pPr>
          <w:r>
            <w:rPr>
              <w:rFonts w:ascii="Times New Roman" w:hAnsi="Times New Roman"/>
              <w:sz w:val="24"/>
            </w:rPr>
            <w:t>${escapedText}</w:t>
          </w:r>
        </w:p>`;
      }).join('');

      const document = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:body>
    <w:sectPr>
      <w:pgSz w:w="12240" w:h="15840"/>
      <w:pgMar w:top="1701" w:right="1134" w:bottom="1134" w:left="1701" w:header="708" w:footer="708" w:gutter="0"/>
    </w:sectPr>
    ${paragraphsXml}
  </w:body>
</w:document>`;

      zip.file('[Content_Types].xml', contentTypes);
      zip.file('_rels/.rels', rels);
      zip.file('word/_rels/document.xml.rels', documentRels);
      zip.file('word/document.xml', document);
      zip.file('word/styles.xml', styles);

      return await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    }

    async function formatar() {
      if (!arquivo) return;

      btn.disabled = true;
      btnIcon.innerHTML = '<div class="spinner"></div>';
      btnText.textContent = 'Processando...';
      msg.style.display = 'none';

      try {
        let texto = '';
        const ext = arquivo.name.split('.').pop().toLowerCase();

        if (ext === 'docx') {
          const arrayBuffer = await arquivo.arrayBuffer();
          const result = await mammoth.extractRawText({ arrayBuffer });
          texto = result.value;
        } else {
          texto = await arquivo.text();
        }

        const linhas = texto.split('\n').filter(l => l.trim());
        if (linhas.length === 0) linhas.push('');

        const blob = await criarDocxAbnt(linhas);
        const url = URL.createObjectURL(blob);

        download.href = url;
        download.style.display = 'flex';
        msg.textContent = '✓ Documento formatado com sucesso!';
        msg.className = 'mensagem sucesso';
        msg.style.display = 'block';
      } catch (e) {
        msg.textContent = 'Erro: ' + e.message;
        msg.className = 'mensagem erro';
        msg.style.display = 'block';
      }

      btn.disabled = false;
      btnIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>';
      btnText.textContent = 'Formatar Documento';
    }
  </script>
</body>
</html>
